<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BFHL Node Hierarchy Explorer</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;700&display=swap"
        rel="stylesheet" />
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #111118;
            --border: #1e1e2e;
            --accent: #7c6af7;
            --accent2: #f7b06a;
            --text: #e8e8f0;
            --muted: #666680;
            --success: #4ade80;
            --error: #f87171;
            --cycle: #fb923c;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .grain {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 99;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            opacity: 0.4;
        }

        header {
            max-width: 860px;
            margin: 0 auto 2.5rem;
            display: flex;
            align-items: flex-end;
            gap: 1rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1.5rem;
        }

        header .logo {
            font-family: 'Space Mono', monospace;
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -2px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        header .sub {
            color: var(--muted);
            font-size: 0.85rem;
            padding-bottom: 4px;
            letter-spacing: 0.04em;
        }

        .container {
            max-width: 860px;
            margin: 0 auto;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .card-title {
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--muted);
            margin-bottom: 1rem;
        }

        textarea {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: 'Space Mono', monospace;
            font-size: 0.85rem;
            padding: 1rem;
            resize: vertical;
            min-height: 120px;
            outline: none;
            transition: border-color 0.2s;
            line-height: 1.6;
        }

        textarea:focus {
            border-color: var(--accent);
        }

        .hint {
            font-size: 0.75rem;
            color: var(--muted);
            margin-top: 0.5rem;
            font-family: 'Space Mono', monospace;
        }

        .row {
            display: flex;
            gap: 0.75rem;
            margin-top: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }

        button {
            font-family: 'DM Sans', sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            padding: 0.65rem 1.5rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.15s;
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
        }

        .btn-primary:hover {
            background: #6a58e0;
            transform: translateY(-1px);
        }

        .btn-primary:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        .btn-ghost {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
        }

        .btn-ghost:hover {
            border-color: var(--muted);
            color: var(--text);
        }

        .api-url {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .api-url input {
            font-family: 'Space Mono', monospace;
            font-size: 0.75rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--muted);
            padding: 0.4rem 0.75rem;
            width: 260px;
            outline: none;
        }

        .api-url input:focus {
            border-color: var(--accent);
            color: var(--text);
        }

        .api-url label {
            font-size: 0.75rem;
            color: var(--muted);
            white-space: nowrap;
        }

        #status {
            font-family: 'Space Mono', monospace;
            font-size: 0.78rem;
            padding: 0.35rem 0.75rem;
            border-radius: 6px;
            display: none;
        }

        #status.ok {
            background: rgba(74, 222, 128, .12);
            color: var(--success);
            display: inline-block;
        }

        #status.err {
            background: rgba(248, 113, 113, .12);
            color: var(--error);
            display: inline-block;
        }

        #status.loading {
            background: rgba(124, 106, 247, .12);
            color: var(--accent);
            display: inline-block;
        }

        /* ── Response area ─────────────────────────────── */
        #response-area {
            display: none;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .stat {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem;
            text-align: center;
        }

        .stat .val {
            font-family: 'Space Mono', monospace;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--accent);
        }

        .stat .lbl {
            font-size: 0.75rem;
            color: var(--muted);
            margin-top: 0.25rem;
        }

        .section-title {
            font-family: 'Space Mono', monospace;
            font-size: 0.68rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--muted);
            margin-bottom: 0.75rem;
            margin-top: 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* Tree cards */
        .tree-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 0.75rem;
        }

        .tree-card {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1rem;
            transition: border-color 0.2s;
        }

        .tree-card:hover {
            border-color: var(--accent);
        }

        .tree-card.cycle {
            border-color: var(--cycle);
        }

        .tree-card .root-label {
            font-family: 'Space Mono', monospace;
            font-size: 1.1rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.75rem;
        }

        .badge {
            font-size: 0.6rem;
            padding: 0.15rem 0.45rem;
            border-radius: 99px;
            font-family: 'Space Mono', monospace;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .badge.cycle {
            background: rgba(251, 146, 60, .2);
            color: var(--cycle);
        }

        .badge.depth {
            background: rgba(124, 106, 247, .2);
            color: var(--accent);
        }

        .tree-view {
            font-family: 'Space Mono', monospace;
            font-size: 0.78rem;
            color: var(--muted);
            line-height: 1.8;
        }

        .tree-view .node {
            color: var(--text);
        }

        .tree-view .branch {
            color: var(--accent);
        }

        /* Tags (invalid / duplicates) */
        .tag-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
        }

        .tag {
            font-family: 'Space Mono', monospace;
            font-size: 0.75rem;
            padding: 0.2rem 0.6rem;
            border-radius: 6px;
            background: rgba(248, 113, 113, .1);
            color: var(--error);
            border: 1px solid rgba(248, 113, 113, .2);
        }

        .tag.dup {
            background: rgba(247, 176, 106, .1);
            color: var(--accent2);
            border-color: rgba(247, 176, 106, .2);
        }

        .empty {
            color: var(--muted);
            font-size: 0.8rem;
            font-family: 'Space Mono', monospace;
        }

        .raw-json {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem;
            font-family: 'Space Mono', monospace;
            font-size: 0.72rem;
            color: var(--muted);
            overflow-x: auto;
            white-space: pre;
            max-height: 300px;
            overflow-y: auto;
        }

        details summary {
            cursor: pointer;
            font-size: 0.78rem;
            color: var(--muted);
            font-family: 'Space Mono', monospace;
            margin-top: 1rem;
            user-select: none;
        }

        details summary:hover {
            color: var(--text);
        }

        @media (max-width: 600px) {
            .summary-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .api-url {
                margin-left: 0;
                width: 100%;
            }

            .api-url input {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <div class="grain"></div>

    <header>
        <div class="logo">BFHL</div>
        <div class="sub">Node Hierarchy Explorer · SRM Challenge</div>
    </header>

    <div class="container">

        <!-- Input -->
        <div class="card">
            <div class="card-title">Input — Node Edges</div>
            <textarea id="input" placeholder='A->B, A->C, B->D, X->Y, Y->Z, Z->X, hello, 1->2'></textarea>
            <div class="hint">Comma or newline separated edges, e.g. A->B, A->C, B->D</div>

            <div class="row">
                <button class="btn-primary" id="submitBtn" onclick="submit()">Run Analysis</button>
                <button class="btn-ghost" onclick="loadExample()">Load Example</button>
                <span id="status"></span>
                <div class="api-url">
                    <label>API URL</label>
                    <input type="text" id="apiUrl" value="http://localhost:3000/bfhl" />
                </div>
            </div>
        </div>

        <!-- Response -->
        <div id="response-area">
            <div class="card">
                <div class="card-title">Summary</div>
                <div class="summary-grid">
                    <div class="stat">
                        <div class="val" id="s-trees">—</div>
                        <div class="lbl">Valid Trees</div>
                    </div>
                    <div class="stat">
                        <div class="val" id="s-cycles">—</div>
                        <div class="lbl">Cycles</div>
                    </div>
                    <div class="stat">
                        <div class="val" id="s-root">—</div>
                        <div class="lbl">Largest Tree Root</div>
                    </div>
                </div>

                <div class="section-title">Hierarchies</div>
                <div class="tree-grid" id="tree-grid"></div>

                <div class="section-title">Invalid Entries</div>
                <div class="tag-list" id="invalid-list"></div>

                <div class="section-title">Duplicate Edges</div>
                <div class="tag-list" id="dup-list"></div>

                <details>
                    <summary>▸ Raw JSON response</summary>
                    <div class="raw-json" id="raw-json"></div>
                </details>
            </div>
        </div>

    </div>

    <script>
        const EXAMPLE = 'A->B, A->C, B->D, C->E, E->F, X->Y, Y->Z, Z->X, P->Q, Q->R, G->H, G->H, G->I, hello, 1->2, A->';

        function loadExample() {
            document.getElementById('input').value = EXAMPLE;
        }

        function setStatus(msg, cls) {
            const el = document.getElementById('status');
            el.textContent = msg;
            el.className = cls;
        }

        function renderTree(node, obj, prefix = '', isLast = true) {
            const connector = isLast ? '└─ ' : '├─ ';
            const childPrefix = isLast ? '   ' : '│  ';
            let out = `<span class="branch">${prefix}${prefix ? connector : ''}</span><span class="node">${node}</span>\n`;
            const keys = Object.keys(obj);
            keys.forEach((k, i) => {
                out += renderTree(k, obj[k], prefix ? prefix + childPrefix : '', i === keys.length - 1);
            });
            return out;
        }

        async function submit() {
            const raw = document.getElementById('input').value.trim();
            const apiUrl = document.getElementById('apiUrl').value.trim();

            if (!raw) { setStatus('Enter some edges first', 'err'); return; }

            // Parse comma / newline separated
            const data = raw.split(/[\n,]+/).map(s => s.trim()).filter(Boolean);

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            setStatus('Calling API…', 'loading');
            document.getElementById('response-area').style.display = 'none';

            try {
                const res = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ data }),
                });

                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const json = await res.json();
                setStatus(`200 OK · ${json.hierarchies.length} groups`, 'ok');
                render(json);
            } catch (e) {
                setStatus(`Error: ${e.message}`, 'err');
            } finally {
                btn.disabled = false;
            }
        }

        function render(json) {
            // Summary
            document.getElementById('s-trees').textContent = json.summary.total_trees;
            document.getElementById('s-cycles').textContent = json.summary.total_cycles;
            document.getElementById('s-root').textContent = json.summary.largest_tree_root || '—';

            // Hierarchies
            const grid = document.getElementById('tree-grid');
            grid.innerHTML = '';
            for (const h of json.hierarchies) {
                const card = document.createElement('div');
                card.className = 'tree-card' + (h.has_cycle ? ' cycle' : '');

                const rootRow = document.createElement('div');
                rootRow.className = 'root-label';
                rootRow.innerHTML = `${h.root} `;
                if (h.has_cycle) rootRow.innerHTML += `<span class="badge cycle">cycle</span>`;
                else rootRow.innerHTML += `<span class="badge depth">depth ${h.depth}</span>`;

                const treeDiv = document.createElement('div');
                treeDiv.className = 'tree-view';
                if (h.has_cycle) {
                    treeDiv.innerHTML = `<span style="color:var(--cycle)">↻ cyclic group</span>`;
                } else {
                    const [root, subtree] = Object.entries(h.tree)[0];
                    treeDiv.innerHTML = renderTree(root, subtree);
                }

                card.appendChild(rootRow);
                card.appendChild(treeDiv);
                grid.appendChild(card);
            }

            // Invalid
            const invList = document.getElementById('invalid-list');
            invList.innerHTML = json.invalid_entries.length
                ? json.invalid_entries.map(e => `<span class="tag">${e}</span>`).join('')
                : '<span class="empty">none</span>';

            // Duplicates
            const dupList = document.getElementById('dup-list');
            dupList.innerHTML = json.duplicate_edges.length
                ? json.duplicate_edges.map(e => `<span class="tag dup">${e}</span>`).join('')
                : '<span class="empty">none</span>';

            // Raw JSON
            document.getElementById('raw-json').textContent = JSON.stringify(json, null, 2);

            document.getElementById('response-area').style.display = 'block';
        }

        // Allow Enter in textarea to NOT submit (just newline), Ctrl+Enter to submit
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('input').addEventListener('keydown', e => {
                if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) submit();
            });
        });
    </script>
</body>

</html>
